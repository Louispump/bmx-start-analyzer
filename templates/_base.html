<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1280">
  <title>{% block title %}BMX Start Analyzer{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body class="app-shell {% block body_class %}{% endblock %}">

  <aside class="sidebar">
    <a href="/" class="sidebar-brand" aria-label="Accueil">
      <svg class="brand-logo" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <!-- Rider skeleton: head, torso, front arm, front leg -->
        <circle cx="18" cy="5" r="3" fill="currentColor" opacity="0.9"/>
        <!-- torso: head→hip -->
        <line x1="18" y1="8" x2="15" y2="18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <!-- arm: shoulder→elbow→wrist -->
        <line x1="17" y1="11" x2="25" y2="15" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="25" y1="15" x2="30" y2="12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <!-- leg: hip→knee→ankle -->
        <line x1="15" y1="18" x2="20" y2="26" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <line x1="20" y1="26" x2="26" y2="30" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <!-- keypoints -->
        <circle cx="17" cy="11" r="2.2" fill="currentColor"/>
        <circle cx="25" cy="15" r="2.2" fill="currentColor"/>
        <circle cx="15" cy="18" r="2.2" fill="currentColor"/>
        <circle cx="20" cy="26" r="2.2" fill="currentColor"/>
        <circle cx="26" cy="30" r="2.2" fill="currentColor"/>
      </svg>
      <span class="brand-text">
        <span class="brand-name">BMX Start</span>
        <span class="brand-sub">Analyzer</span>
      </span>
    </a>

    <nav class="sidebar-nav">
      <a href="/" class="nav-item {% if active == 'index' %}active{% endif %}">
        <svg viewBox="0 0 20 20" class="nav-icon"><path d="M3 10v7h14v-7M10 2v12M5 7l5-5 5 5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Nouvelle analyse</span>
      </a>
      <a href="/athletes" class="nav-item {% if active == 'athletes' %}active{% endif %}">
        <svg viewBox="0 0 20 20" class="nav-icon"><path d="M10 10a3 3 0 100-6 3 3 0 000 6zM4 17c0-3 2.7-5 6-5s6 2 6 5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Athlètes</span>
      </a>
      <a href="/pros" class="nav-item {% if active == 'pros' %}active{% endif %}">
        <svg viewBox="0 0 20 20" class="nav-icon"><path d="M5 17v-5l5-3 5 3v5M3 8l7-5 7 5" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Banque de pros</span>
      </a>
      {% if active == 'result' or active == 'compare' %}
      <div class="nav-divider"></div>
      <a href="/result/{{ job_id }}" class="nav-item nav-sub {% if active == 'result' %}active{% endif %}">
        <svg viewBox="0 0 20 20" class="nav-icon"><path d="M3 6h14M3 10h14M3 14h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span>Analyse</span>
      </a>
      <a href="/compare/{{ job_id }}" class="nav-item nav-sub {% if active == 'compare' %}active{% endif %}">
        <svg viewBox="0 0 20 20" class="nav-icon"><path d="M5 4v12M15 4v12M5 10h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span>Comparaison</span>
      </a>
      {% endif %}
    </nav>

    <div class="sidebar-footer">
      <span class="version-tag">v0.2 · MVP</span>
    </div>
  </aside>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
