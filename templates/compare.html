<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparaison — {{ rider.video_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="compare-body">

  <!-- Barre de sélection du pro -->
  <div class="compare-topbar">
    <a href="/result/{{ job_id }}" class="back-link-white">← Retour</a>
    <span class="compare-title">Comparaison</span>
    <div class="pro-selector">
      <select id="pro-select" onchange="changePro(this.value)">
        <option value="">— Choisir un pro —</option>
        {% for pro in pros_list %}
        <option value="{{ pro.video_file }}" data-fps="{{ pro.fps }}" data-name="{{ pro.name }}">
          {{ pro.name }}
        </option>
        {% endfor %}
      </select>
      <a href="/pros" class="btn-manage-pros" target="_blank">Gérer les pros</a>
    </div>
  </div>

  <!-- Vue côte à côte -->
  <div class="side-by-side">

    <!-- Panneau RIDER -->
    <div class="video-panel" id="panel-rider" onclick="setActive('rider')">
      <div class="panel-label">
        <span class="panel-tag rider-tag">RIDER</span>
        {{ rider.video_name }}
      </div>
      <div class="panel-video-wrap">
        <video id="video-rider" playsinline preload="metadata"
               src="/output/{{ rider.files.annotated_video }}">
        </video>
      </div>
      <div class="panel-controls">
        <button class="btn-frame" onclick="step('rider', -1)">&#9664;</button>
        <span class="frame-counter" id="counter-rider">Frame —</span>
        <button class="btn-frame" onclick="step('rider', +1)">&#9654;</button>
      </div>
    </div>

    <!-- Panneau PRO -->
    <div class="video-panel" id="panel-pro" onclick="setActive('pro')">
      <div class="panel-label">
        <span class="panel-tag pro-tag">PRO</span>
        <span id="pro-name">Sélectionne un pro</span>
      </div>
      <div class="panel-video-wrap" id="pro-video-wrap">
        <div class="panel-empty">
          Sélectionne un pro<br>dans le menu ci-dessus
        </div>
        <video id="video-pro" playsinline preload="metadata" style="display:none"></video>
      </div>
      <div class="panel-controls">
        <button class="btn-frame" onclick="step('pro', -1)">&#9664;</button>
        <span class="frame-counter" id="counter-pro">Frame —</span>
        <button class="btn-frame" onclick="step('pro', +1)">&#9654;</button>
      </div>
    </div>

  </div><!-- /side-by-side -->

  <!-- Aide clavier -->
  <div class="compare-footer">
    <span>Clic sur un panneau pour le sélectionner</span>
    <span>← → frame par frame &nbsp;·&nbsp; Espace play/pause &nbsp;·&nbsp; Tab changer de panneau</span>
  </div>

  <script>
    const riderFps = {{ rider.fps }};
    let proFps     = riderFps;
    let active     = 'rider';   // panneau actif pour les touches clavier

    const videos  = { rider: document.getElementById('video-rider'),
                      pro:   document.getElementById('video-pro') };
    const counters = { rider: document.getElementById('counter-rider'),
                       pro:   document.getElementById('counter-pro') };
    const panels   = { rider: document.getElementById('panel-rider'),
                       pro:   document.getElementById('panel-pro') };

    // ── Sélection panneau actif ───────────────────────────────────────
    function setActive(which) {
      active = which;
      Object.keys(panels).forEach(k => panels[k].classList.toggle('active-panel', k === which));
    }
    setActive('rider');

    // ── Frame par frame ───────────────────────────────────────────────
    function step(which, dir) {
      const v   = videos[which];
      const fps = which === 'rider' ? riderFps : proFps;
      if (!v.src) return;
      v.pause();
      v.currentTime = Math.max(0, Math.min(v.duration || 9999, v.currentTime + dir / fps));
    }

    // Mise à jour compteur
    function updateCounter(which) {
      const v   = videos[which];
      const fps = which === 'rider' ? riderFps : proFps;
      const f   = Math.round(v.currentTime * fps);
      counters[which].textContent = `Frame ${f}`;
    }

    videos.rider.addEventListener('timeupdate', () => updateCounter('rider'));
    videos.rider.addEventListener('seeked',     () => updateCounter('rider'));
    videos.pro.addEventListener('timeupdate',   () => updateCounter('pro'));
    videos.pro.addEventListener('seeked',       () => updateCounter('pro'));

    // ── Clavier ───────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight') { e.preventDefault(); step(active, +1); }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); step(active, -1); }
      if (e.key === ' ') {
        e.preventDefault();
        const v = videos[active];
        if (v.src) v.paused ? v.play() : v.pause();
      }
      if (e.key === 'Tab') {
        e.preventDefault();
        setActive(active === 'rider' ? 'pro' : 'rider');
      }
    });

    // ── Changer de pro ────────────────────────────────────────────────
    function changePro(videoFile) {
      const select = document.getElementById('pro-select');
      const opt    = select.options[select.selectedIndex];
      const vPro   = videos.pro;
      const wrap   = document.getElementById('pro-video-wrap');
      const empty  = wrap.querySelector('.panel-empty');

      if (!videoFile) {
        vPro.style.display = 'none';
        empty && (empty.style.display = 'flex');
        document.getElementById('pro-name').textContent = 'Sélectionne un pro';
        counters.pro.textContent = 'Frame —';
        return;
      }

      proFps = parseFloat(opt.dataset.fps) || riderFps;
      document.getElementById('pro-name').textContent = opt.dataset.name;

      vPro.src           = '/output/' + videoFile;
      vPro.style.display = 'block';
      if (empty) empty.style.display = 'none';
      vPro.load();
      counters.pro.textContent = 'Frame 0';
    }
  </script>
</body>
</html>
