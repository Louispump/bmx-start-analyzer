<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparaison — {{ rider.video_name }}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="compare-body">

  <!-- Barre du haut -->
  <div class="compare-topbar">
    <a href="/result/{{ job_id }}" class="back-link-white">← Retour</a>
    <span class="compare-title">Comparaison</span>
    <div class="pro-selector">
      <select id="pro-select" onchange="changePro(this.value)">
        <option value="">— Choisir un pro —</option>
        {% for pro in pros_list %}
        <option value="{{ pro.video_file }}" data-fps="{{ pro.fps }}" data-name="{{ pro.name }}">
          {{ pro.name }}
        </option>
        {% endfor %}
      </select>
      <a href="/pros" class="btn-manage-pros" target="_blank">Gérer les pros</a>
    </div>
  </div>

  <!-- Vue côte à côte -->
  <div class="side-by-side">

    <!-- Panneau RIDER -->
    <div class="video-panel active-panel" id="panel-rider">
      <div class="panel-label" onclick="setActive('rider')">
        <span class="panel-tag rider-tag">RIDER</span>
        {{ rider.video_name }}
      </div>
      <div class="panel-video-wrap">
        <video id="video-rider" playsinline preload="auto"
               src="/output/{{ rider.files.annotated_video }}">
        </video>
      </div>
      <!-- Scrubber -->
      <div class="panel-scrubber-wrap" onclick="event.stopPropagation()">
        <input type="range" class="scrubber" id="scrub-rider" min="0" max="1000" value="0" step="1">
      </div>
      <!-- Contrôles frame par frame -->
      <div class="panel-controls" onclick="event.stopPropagation()">
        <button class="btn-frame" onclick="step('rider',-1)">&#9664;</button>
        <span class="frame-counter" id="counter-rider">Frame 0</span>
        <button class="btn-frame" onclick="step('rider',+1)">&#9654;</button>
      </div>
    </div>

    <!-- Panneau PRO -->
    <div class="video-panel" id="panel-pro">
      <div class="panel-label" onclick="setActive('pro')">
        <span class="panel-tag pro-tag">PRO</span>
        <span id="pro-name">Sélectionne un pro</span>
      </div>
      <div class="panel-video-wrap" id="pro-video-wrap">
        <div class="panel-empty" id="pro-empty">
          Sélectionne un pro<br>dans le menu ci-dessus
        </div>
        <video id="video-pro" playsinline preload="auto" style="display:none"></video>
      </div>
      <!-- Scrubber -->
      <div class="panel-scrubber-wrap" onclick="event.stopPropagation()">
        <input type="range" class="scrubber" id="scrub-pro" min="0" max="1000" value="0" step="1" disabled>
      </div>
      <!-- Contrôles frame par frame -->
      <div class="panel-controls" onclick="event.stopPropagation()">
        <button class="btn-frame" onclick="step('pro',-1)">&#9664;</button>
        <span class="frame-counter" id="counter-pro">Frame —</span>
        <button class="btn-frame" onclick="step('pro',+1)">&#9654;</button>
      </div>
    </div>

  </div>

  <!-- Aide clavier -->
  <div class="compare-footer">
    <span>Clic sur le titre du panneau pour le sélectionner (bordure bleue = actif)</span>
    <span>← → frame par frame &nbsp;·&nbsp; Espace play/pause &nbsp;·&nbsp; Tab changer de panneau</span>
  </div>

  <script>
    const riderFps = {{ rider.fps }};
    let   proFps   = riderFps;
    let   active   = 'rider';
    let   scrubbing = { rider: false, pro: false };

    const vRider = document.getElementById('video-rider');
    const vPro   = document.getElementById('video-pro');
    const videos = { rider: vRider, pro: vPro };

    const scrubs   = { rider: document.getElementById('scrub-rider'),
                       pro:   document.getElementById('scrub-pro') };
    const counters = { rider: document.getElementById('counter-rider'),
                       pro:   document.getElementById('counter-pro') };
    const panels   = { rider: document.getElementById('panel-rider'),
                       pro:   document.getElementById('panel-pro') };

    // ── Panneau actif ─────────────────────────────────────────────────
    function setActive(which) {
      active = which;
      Object.keys(panels).forEach(k =>
        panels[k].classList.toggle('active-panel', k === which));
    }

    // ── Frame par frame ───────────────────────────────────────────────
    function step(which, dir) {
      const v   = videos[which];
      const fps = which === 'rider' ? riderFps : proFps;
      if (v.readyState < 1) return;   // métadonnées pas encore chargées
      v.pause();
      v.currentTime = Math.max(0,
        Math.min(v.duration, v.currentTime + dir / fps));
    }

    // ── Sync UI (compteur + scrubber) ─────────────────────────────────
    function syncUI(which) {
      const v   = videos[which];
      const fps = which === 'rider' ? riderFps : proFps;
      if (v.readyState < 1 || !isFinite(v.duration) || v.duration === 0) return;

      const frame = Math.round(v.currentTime * fps);
      counters[which].textContent = `Frame ${frame}`;

      // Ne pas bouger le scrubber si l'utilisateur est en train de le tirer
      if (!scrubbing[which]) {
        scrubs[which].value = Math.round(v.currentTime / v.duration * 1000);
      }
    }

    ['timeupdate','seeked','loadedmetadata'].forEach(ev => {
      vRider.addEventListener(ev, () => syncUI('rider'));
      vPro.addEventListener(ev,   () => syncUI('pro'));
    });

    // ── Scrubber input ────────────────────────────────────────────────
    function initScrubber(which) {
      const s = scrubs[which];
      const v = videos[which];

      s.addEventListener('mousedown',  () => { scrubbing[which] = true; });
      s.addEventListener('touchstart', () => { scrubbing[which] = true; }, {passive:true});

      s.addEventListener('input', () => {
        if (v.readyState < 1 || !isFinite(v.duration)) return;
        v.currentTime = (s.value / 1000) * v.duration;
        syncUI(which);
      });

      s.addEventListener('mouseup',  () => { scrubbing[which] = false; });
      s.addEventListener('touchend', () => { scrubbing[which] = false; });
    }
    initScrubber('rider');
    initScrubber('pro');

    // ── Clavier ───────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'SELECT' || e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight') { e.preventDefault(); step(active, +1); }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); step(active, -1); }
      if (e.key === ' ') {
        e.preventDefault();
        const v = videos[active];
        if (v.readyState >= 1) v.paused ? v.play() : v.pause();
      }
      if (e.key === 'Tab') {
        e.preventDefault();
        setActive(active === 'rider' ? 'pro' : 'rider');
      }
    });

    // ── Changer de pro ────────────────────────────────────────────────
    function changePro(videoFile) {
      const select = document.getElementById('pro-select');
      const opt    = select.options[select.selectedIndex];
      const empty  = document.getElementById('pro-empty');

      if (!videoFile) {
        vPro.style.display      = 'none';
        vPro.src                = '';
        empty.style.display     = 'flex';
        scrubs.pro.disabled     = true;
        scrubs.pro.value        = 0;
        counters.pro.textContent = 'Frame —';
        document.getElementById('pro-name').textContent = 'Sélectionne un pro';
        return;
      }

      proFps = parseFloat(opt.dataset.fps) || riderFps;
      document.getElementById('pro-name').textContent = opt.dataset.name;

      empty.style.display  = 'none';
      vPro.style.display   = 'block';
      scrubs.pro.disabled  = true;   // désactivé jusqu'au chargement
      counters.pro.textContent = 'Chargement…';

      vPro.src = '/output/' + videoFile;
      vPro.load();

      vPro.addEventListener('loadedmetadata', () => {
        scrubs.pro.disabled = false;
        scrubs.pro.value    = 0;
        counters.pro.textContent = 'Frame 0';
      }, { once: true });
    }
  </script>
</body>
</html>
