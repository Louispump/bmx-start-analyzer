<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMX Start Analyzer</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="page">
    <header>
      <h1>BMX Start Analyzer</h1>
      <p class="subtitle">Analyse biomécanique du départ BMX</p>
    </header>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <!-- ÉTAPE 1 : Upload -->
    <div id="step-upload">
      <div class="upload-zone" id="dropzone">
        <div class="upload-icon">🎬</div>
        <p class="upload-label">Glisse ta vidéo ici</p>
        <p class="upload-hint">ou</p>
        <label class="btn btn-primary" for="file-input">Choisir un fichier</label>
        <input type="file" id="file-input" accept="video/*" style="display:none">
        <p class="upload-formats">MP4 · MOV · AVI</p>
      </div>
    </div>

    <!-- ÉTAPE 2 : Sélection du gate drop -->
    <div id="step-gate" style="display:none">
      <div class="gate-select-box">
        <h2>📍 Identifie le gate drop</h2>
        <p class="section-note">
          Scrub jusqu'au moment où la grille commence à tomber, puis clique sur
          <strong>Marquer</strong>.
        </p>
        <div class="gate-video-wrap">
          <video id="gate-video" playsinline preload="auto" controls></video>
        </div>
        <div class="gate-scrubber-wrap">
          <input type="range" class="scrubber scrubber-light" id="gate-scrub"
                 min="0" max="1000" value="0" step="1">
        </div>
        <div class="gate-controls">
          <button class="btn-frame btn-frame-dark" onclick="gateStep(-1)">&#9664;</button>
          <span class="frame-counter-dark" id="gate-counter">Frame 0</span>
          <button class="btn-frame btn-frame-dark" onclick="gateStep(+1)">&#9654;</button>
        </div>
        <div class="gate-marker" id="gate-marker">
          Gate drop : <strong id="gate-marker-val">non défini</strong>
        </div>
        <div class="gate-actions">
          <button class="btn btn-gate-mark" onclick="markGate()">📌 Marquer le gate ici</button>
          <button class="btn btn-primary" id="btn-confirm-gate"
                  onclick="confirmGate()" disabled>
            ✓ Confirmer et analyser
          </button>
        </div>
      </div>
    </div>

    <!-- ÉTAPE 3 : Progression -->
    <div id="step-progress" style="display:none">
      <div class="progress-block" style="display:flex">
        <div class="spinner"></div>
        <p class="progress-label" id="progress-label">En cours...</p>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>
    </div>

  </div>

  <script>
    let jobId     = null;
    let videoFps  = 30;
    let gateFrame = null;
    let scrubbing = false;

    const gateVideo   = document.getElementById('gate-video');
    const gateScrub   = document.getElementById('gate-scrub');
    const gateCounter = document.getElementById('gate-counter');

    // ── Upload ────────────────────────────────────────────────────────
    const dropzone  = document.getElementById('dropzone');
    const fileInput = document.getElementById('file-input');
    dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault(); dropzone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) startUpload(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) startUpload(e.target.files[0]); });

    async function startUpload(file) {
      const form = new FormData();
      form.append('file', file);
      const res  = await fetch('/upload', { method: 'POST', body: form });
      const data = await res.json();
      jobId    = data.job_id;
      videoFps = data.fps;
      gateVideo.src = data.video_url;
      gateVideo.load();
      gateScrub.max = Math.max(1, data.n_frames - 1);
      document.getElementById('step-upload').style.display = 'none';
      document.getElementById('step-gate').style.display   = 'block';
    }

    // ── Sync scrubber ↔ vidéo ─────────────────────────────────────────
    gateVideo.addEventListener('timeupdate', () => {
      if (!scrubbing) gateScrub.value = Math.round(gateVideo.currentTime * videoFps);
      gateCounter.textContent = `Frame ${Math.round(gateVideo.currentTime * videoFps)}`;
    });
    gateScrub.addEventListener('mousedown',  () => { scrubbing = true; });
    gateScrub.addEventListener('touchstart', () => { scrubbing = true; }, {passive:true});
    gateScrub.addEventListener('input', () => {
      gateVideo.currentTime   = gateScrub.value / videoFps;
      gateCounter.textContent = `Frame ${gateScrub.value}`;
    });
    gateScrub.addEventListener('mouseup',  () => { scrubbing = false; });
    gateScrub.addEventListener('touchend', () => { scrubbing = false; });

    document.addEventListener('keydown', e => {
      if (document.getElementById('step-gate').style.display === 'none') return;
      if (e.target.tagName === 'INPUT') return;
      if (e.key === 'ArrowRight') { e.preventDefault(); gateStep(+1); }
      if (e.key === 'ArrowLeft')  { e.preventDefault(); gateStep(-1); }
      if (e.key === ' ')          { e.preventDefault(); gateVideo.paused ? gateVideo.play() : gateVideo.pause(); }
    });

    function gateStep(dir) {
      gateVideo.pause();
      const f = Math.max(0, Math.round(gateVideo.currentTime * videoFps) + dir);
      gateVideo.currentTime   = f / videoFps;
      gateScrub.value         = f;
      gateCounter.textContent = `Frame ${f}`;
    }

    // ── Marquer + confirmer ───────────────────────────────────────────
    function markGate() {
      gateFrame = Math.round(gateVideo.currentTime * videoFps);
      document.getElementById('gate-marker-val').textContent =
        `Frame ${gateFrame}  (t = ${(gateFrame / videoFps).toFixed(3)}s)`;
      document.getElementById('btn-confirm-gate').disabled = false;
    }

    async function confirmGate() {
      if (gateFrame === null) return;
      document.getElementById('step-gate').style.display     = 'none';
      document.getElementById('step-progress').style.display = 'block';
      const form = new FormData();
      form.append('gate_frame', gateFrame);
      await fetch(`/start/${jobId}`, { method: 'POST', body: form });
      pollStatus();
    }

    // ── Polling ───────────────────────────────────────────────────────
    function pollStatus() {
      const bar = document.getElementById('progress-bar');
      const lbl = document.getElementById('progress-label');
      let w = 10;
      const iv = setInterval(async () => {
        const res  = await fetch(`/status/${jobId}`);
        const data = await res.json();
        if (data.progress) lbl.textContent = data.progress;
        if (w < 90) { w += 0.5; bar.style.width = w + '%'; }
        if (data.status === 'done') {
          clearInterval(iv); bar.style.width = '100%';
          setTimeout(() => window.location.href = `/result/${jobId}`, 400);
        } else if (data.status === 'error') {
          clearInterval(iv);
          lbl.textContent = '❌ ' + data.error;
        }
      }, 1500);
    }
  </script>
</body>
</html>
