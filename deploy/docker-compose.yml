# ────────────────────────────────────────────────────────────────────────
# BMX Start Analyzer — orchestration prod
# - service "app"   : FastAPI/uvicorn (image Dockerfile)
# - service "caddy" : reverse proxy + HTTPS Let's Encrypt + Basic Auth
# ────────────────────────────────────────────────────────────────────────
services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      # Persistance des vidéos et analyses (survit aux rebuilds d'image).
      - ../uploads:/app/uploads
      - ../output:/app/output
    environment:
      - PYTHONUNBUFFERED=1

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    # IMPORTANT : on utilise un fichier nommé `caddy.env` (pas `.env`)
    # parce que docker-compose lit AUTOMATIQUEMENT le fichier `.env`
    # pour son interpolation interne, ce qui mange les `$` du hash bcrypt
    # → Caddy reçoit un hash tronqué. Utiliser un autre nom contourne ça.
    env_file:
      - caddy.env
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
